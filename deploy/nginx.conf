server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history 模式支持
    location / {
        try_files $uri $uri/ /index.html;
    }

   # 静态资源缓存（可选）
   location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
       expires 30d;
       add_header Cache-Control "public, immutable";
       access_log off;
   }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
