version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    network_mode: "host"
    environment:
      # Root 用户密码（必需）
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      # 创建的应用数据库
      MYSQL_DATABASE: blog
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: always
    network_mode: "host"
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务 (从本地镜像或镜像仓库拉取)
  backend:
    image: ${DOCKER_REGISTRY:-}/${IMAGE_PREFIX:-djblog}/backend:${VERSION:-latest}
    container_name: blog-backend
    restart: always
    network_mode: "host"
    environment:
      # Spring 环境配置
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      
      # 数据库配置
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable must be set}
      
      # Redis 配置
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable must be set}
      
      # JWT 配置（生产环境必须设置）
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable must be set for production}
      
      # AI 配置（可选）
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  # 前端服务 (从本地镜像或镜像仓库拉取)
  frontend:
    image: ${DOCKER_REGISTRY:-}/${IMAGE_PREFIX:-djblog}/frontend:${VERSION:-latest}
    container_name: blog-frontend
    restart: always
    network_mode: "host"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
