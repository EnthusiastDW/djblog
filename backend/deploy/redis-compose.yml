services:
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Shanghai
    command:
      - redis-server
      - --appendonly yes
      - --save 900 1
      - --save 300 10
      - --save 60 10000
      - --requirepass 123456
      - --maxmemory 256mb
      - --maxmemory-policy volatile-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
    name: redis-data
