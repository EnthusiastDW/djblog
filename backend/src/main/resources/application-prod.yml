# 生产环境配置
server:
  port: 8801

# JWT 配置（生产环境必须使用环境变量）
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET environment variable must be set for production}
  expiration: 604800

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/blog?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:?DB_PASSWORD environment variable must be set}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 初始连接数
      initial-size: 10
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 50
      # 获取连接时最大等待时间（毫秒）
      max-wait: 30000
      # 配置间隔多久才进行一次检测（毫秒）
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 sql
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    default-schema: blog
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:?DB_PASSWORD environment variable must be set}
  
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable must be set}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

# MyBatis Plus 配置（生产环境关闭 SQL 日志）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Springdoc OpenAPI 配置（生产环境关闭）
springdoc:
  swagger-ui:
    enabled: false

# 日志级别配置（生产环境精简日志）
logging:
  level:
    root: WARN
    site.dengwei.blog: INFO
    com.baomidou.mybatisplus: WARN
    org.springframework: WARN
  file:
    name: ./logs/blog/blog-prod.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
