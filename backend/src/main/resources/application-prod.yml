# 生产环境配置
server:
  port: 8801

# JWT 配置
jwt:
  secret: ${JWT_SECRET:djblog-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm-security}
  expiration: 604800

spring:
  application:
    name: blog
  
  datasource:
    url: jdbc:mysql://192.168.23.101:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 初始连接数
      initial-size: 10
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 50
      # 获取连接时最大等待时间（毫秒）
      max-wait: 30000
      # 配置间隔多久才进行一次检测（毫秒）
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 sql
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    default-schema: blog
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
  
  data:
    redis:
      host: ${REDIS_HOST:192.168.23.101}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: site.dengwei.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭 SQL 日志
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Springdoc OpenAPI 配置
springdoc:
  packages-to-scan: site.dengwei.blog.controller
  swagger-ui:
    path: /swagger-ui.html
    enabled: false  # 生产环境关闭 Swagger UI

# 日志级别配置
logging:
  level:
    root: WARN
    site.dengwei.blog: INFO
    com.baomidou.mybatisplus: WARN
    org.springframework: WARN
  file:
    name: ./logs/blog/blog-prod.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
