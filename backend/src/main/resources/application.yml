server:
  port: 8801

spring:
  application:
    name: blog
  # 默认激活的开发环境
  profiles:
    active: dev

  # Spring AI 配置（使用 DashScope OpenAI 兼容接口调用千问模型）
  ai:
    openai:
      api-key: ${AI_DASHSCOPE_API_KEY:your-api-key-here}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-turbo
          temperature: 0.3

# JWT 默认配置（可被环境配置覆盖）
jwt:
  secret: djblog-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm-security
  expiration: 604800

# MyBatis Plus 通用配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Springdoc OpenAPI 通用配置
springdoc:
  packages-to-scan: site.dengwei.blog.controller
  swagger-ui:
    path: /swagger-ui.html

# 博客评论审核配置（全局）
blog:
  comment:
    # 是否启用评论审核（true: 需要审核，false: 默认通过）
    audit-enabled: false
    # 是否启用 AI 智能判断
    ai-enabled: false
    # AI 判断模式（AUTO: 自动决定，MANUAL: 辅助判断）
    ai-mode: MANUAL
