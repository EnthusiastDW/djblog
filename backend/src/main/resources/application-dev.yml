# 开发环境配置
server:
  port: 8801

# JWT 配置（开发环境使用固定密钥）
jwt:
  secret: djblog-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm-security
  expiration: 604800

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:192.168.23.101}:${DB_PORT:3306}/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 5
      # 最大连接池数量
      max-active: 20
      # 获取连接时最大等待时间（毫秒）
      max-wait: 60000
      # 配置间隔多久才进行一次检测（毫秒）
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 sql
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    default-schema: blog
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
  
# MyBatis Plus 配置（开发环境开启 SQL 日志）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Springdoc OpenAPI 配置（开发环境开启）
springdoc:
  swagger-ui:
    enabled: true

# 日志级别配置（开发环境详细日志）
logging:
  level:
    root: INFO
#    site.dengwei.blog: DEBUG
#    com.baomidou.mybatisplus: DEBUG
#    org.springframework: WARN
#    org.hibernate.validator: DEBUG
  file:
    path: ./logs

