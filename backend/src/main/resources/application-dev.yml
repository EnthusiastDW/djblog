# 开发环境配置
server:
  port: 8801

spring:
  application:
    name: blog
  
  datasource:
    url: jdbc:mysql://192.168.23.101:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 5
      # 最大连接池数量
      max-active: 20
      # 获取连接时最大等待时间（毫秒）
      max-wait: 60000
      # 配置间隔多久才进行一次检测（毫秒）
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 用来检测连接是否有效的 sql
      validation-query: SELECT 1
      # 建议配置为 true，不影响性能，并且保证安全性
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    default-schema: blog
    user: root
    password: root123
  
  data:
    redis:
      host: 192.168.23.101
      port: 6379
      password: 123456
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: site.dengwei.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Springdoc OpenAPI 配置
springdoc:
  packages-to-scan: site.dengwei.blog.controller
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 日志级别配置
logging:
  level:
    root: INFO
    site.dengwei.blog: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.springframework: WARN
